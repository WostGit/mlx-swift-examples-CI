name: Ultra Verbose MLX LLM Examples CI

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/ultra-verbose-mlx-llm-examples.yml"
  pull_request:
    paths:
      - ".github/workflows/ultra-verbose-mlx-llm-examples.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  discover:
    name: Discover LLM example schemes and destinations
    runs-on: macos-15
    timeout-minutes: 45
    env:
      DEVELOPER_DIR: /Applications/Xcode_16.3.app/Contents/Developer
      NSUnbufferedIO: YES
    outputs:
      matrix_json: ${{ steps.emit.outputs.matrix_json }}
      discovery_summary: ${{ steps.emit.outputs.discovery_summary }}

    steps:
      - name: Checkout workflow repository
        uses: actions/checkout@v4

      - name: Restore SwiftPM cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.swiftpm
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-mlx-llm-discover-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-mlx-llm-discover-
            ${{ runner.os }}-mlx-llm-

      - name: Prepare workspace
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p ci/repos ci/out ci/logs

      - name: Show runner and toolchain context
        shell: bash
        run: |
          set -euxo pipefail

          echo "::group::runner and toolchain"
          date
          uname -a
          sw_vers
          xcode-select -p
          xcodebuild -version
          swift --version
          env | sort
          echo "::endgroup::"

          echo "::group::simulator runtimes"
          xcrun simctl list runtimes || true
          echo "::endgroup::"

          echo "::group::simulator devices"
          xcrun simctl list devices available || true
          echo "::endgroup::"

      - name: Clone mlx-swift-examples
        shell: bash
        run: |
          set -euxo pipefail

          git clone --depth 1 --branch main https://github.com/ml-explore/mlx-swift-examples.git ci/repos/mlx-swift-examples

          echo "::group::repo tree"
          cd ci/repos/mlx-swift-examples
          pwd
          git rev-parse HEAD
          git status --short --branch
          find . -maxdepth 3 | sort
          echo "::endgroup::"

      - name: Discover only LLM example schemes and usable destinations
        id: emit
        shell: bash
        run: |
          set -euxo pipefail

          python3 <<'PY'
          import json
          import os
          import subprocess
          from pathlib import Path

          repo = Path("ci/repos/mlx-swift-examples")
          out_dir = Path("ci/out")
          out_dir.mkdir(parents=True, exist_ok=True)

          # Focus only on known LLM example schemes.
          TARGET_SCHEMES = [
              "LLMBasic",
              "LLMEval",
              "MLXChatExample",
          ]

          def run_capture(cmd, cwd):
              p = subprocess.run(cmd, cwd=cwd, text=True, capture_output=True)
              return p.returncode, p.stdout, p.stderr

          def parse_showdestinations(text):
              entries = []
              current_section = None

              for raw in text.splitlines():
                  line = raw.rstrip()

                  if "Available destinations for the" in line:
                      current_section = "available"
                      continue

                  if "Ineligible destinations for the" in line:
                      current_section = "ineligible"
                      continue

                  s = line.strip()
                  if not (s.startswith("{") and s.endswith("}")):
                      continue

                  body = s[1:-1]
                  fields = {}
                  for part in body.split(", "):
                      if ":" in part:
                          k, v = part.split(":", 1)
                          fields[k.strip()] = v.strip()

                  fields["_section"] = current_section
                  entries.append(fields)

              return entries

          rc, out, err = run_capture(
              ["xcodebuild", "-list", "-json", "-project", "mlx-swift-examples.xcodeproj"],
              repo
          )
          if rc != 0:
              print(out)
              print(err)
              raise SystemExit(rc)

          payload = json.loads(out)
          all_schemes = payload.get("project", {}).get("schemes", [])
          candidate_schemes = [s for s in TARGET_SCHEMES if s in all_schemes]

          discovery = []
          matrix_include = []

          for scheme in candidate_schemes:
              rc, d_out, d_err = run_capture(
                  ["xcodebuild", "-project", "mlx-swift-examples.xcodeproj", "-scheme", scheme, "-showdestinations"],
                  repo
              )
              combined = d_out + "\n" + d_err
              destinations = parse_showdestinations(combined)

              available = [d for d in destinations if d.get("_section") == "available"]
              usable = []

              for d in available:
                  plat = d.get("platform", "")
                  name = d.get("name", "")
                  osver = d.get("OS", "latest")

                  # Keep only concrete, likely-useful build destinations.
                  if plat == "macOS":
                      spec = "platform=macOS"
                      label = "macOS"
                  elif plat in ("iOS Simulator", "visionOS Simulator"):
                      if not name or name.startswith("Any "):
                          continue
                      spec = f"platform={plat},name={name}"
                      if osver and osver != "latest":
                          spec += f",OS={osver}"
                      label = f"{plat}:{name}:{osver}"
                  else:
                      continue

                  usable.append(
                      {
                          "platform": plat,
                          "destination": spec,
                          "destination_label": label,
                      }
                  )

              unique = []
              seen = set()
              for item in usable:
                  if item["destination"] in seen:
                      continue
                  seen.add(item["destination"])
                  unique.append(item)

              def sort_key(x):
                  if x["platform"] == "macOS":
                      return (0, x["destination_label"])
                  if x["platform"] == "iOS Simulator":
                      return (1, x["destination_label"])
                  if x["platform"] == "visionOS Simulator":
                      return (2, x["destination_label"])
                  return (9, x["destination_label"])

              unique = sorted(unique, key=sort_key)

              discovery.append(
                  {
                      "scheme": scheme,
                      "showdestinations_rc": rc,
                      "raw_destination_count": len(destinations),
                      "usable_destinations": unique,
                      "raw_showdestinations_stdout": d_out,
                      "raw_showdestinations_stderr": d_err,
                  }
              )

              for destination in unique:
                  for configuration in ("Debug", "Release"):
                      matrix_include.append(
                          {
                              "scheme": scheme,
                              "configuration": configuration,
                              "destination": destination["destination"],
                              "destination_label": destination["destination_label"],
                              "platform": destination["platform"],
                          }
                      )

          manifest = {
              "target_schemes_requested": TARGET_SCHEMES,
              "target_schemes_found": candidate_schemes,
              "discovery": discovery,
              "matrix_size": len(matrix_include),
          }
          matrix = {"include": matrix_include}

          manifest_path = out_dir / "manifest.json"
          matrix_path = out_dir / "matrix.json"
          summary_path = out_dir / "discovery-summary.md"

          manifest_path.write_text(json.dumps(manifest, indent=2), encoding="utf-8")
          matrix_path.write_text(json.dumps(matrix, indent=2), encoding="utf-8")

          summary_lines = []
          summary_lines.append("# MLX LLM example discovery")
          summary_lines.append("")
          summary_lines.append(f"- Requested LLM schemes: **{', '.join(TARGET_SCHEMES)}**")
          summary_lines.append(f"- Found LLM schemes: **{', '.join(candidate_schemes) if candidate_schemes else '(none)'}**")
          summary_lines.append(f"- Matrix entries: **{len(matrix_include)}**")
          summary_lines.append("")
          summary_lines.append("| Scheme | Usable destinations |")
          summary_lines.append("|---|---|")
          for item in discovery:
              labels = ", ".join(x["destination_label"] for x in item["usable_destinations"])
              summary_lines.append(f"| {item['scheme']} | {labels} |")
          summary_md = "\n".join(summary_lines) + "\n"
          summary_path.write_text(summary_md, encoding="utf-8")

          print("::group::manifest.json")
          print(manifest_path.read_text(encoding="utf-8"))
          print("::endgroup::")

          print("::group::matrix.json")
          print(matrix_path.read_text(encoding="utf-8"))
          print("::endgroup::")

          print("::group::discovery-summary.md")
          print(summary_md)
          print("::endgroup::")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write("matrix_json<<EOF\n")
              f.write(matrix_path.read_text(encoding="utf-8"))
              f.write("\nEOF\n")
              f.write("discovery_summary<<EOF\n")
              f.write(summary_md)
              f.write("\nEOF\n")
          PY

      - name: Upload discovery artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlx-llm-discovery
          path: ci/out
          if-no-files-found: ignore

  iterative-builds:
    name: ${{ matrix.scheme }} | ${{ matrix.configuration }} | ${{ matrix.destination_label }}
    needs: discover
    runs-on: macos-15
    timeout-minutes: 120
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix: ${{ fromJson(needs.discover.outputs.matrix_json) }}

    env:
      DEVELOPER_DIR: /Applications/Xcode_16.3.app/Contents/Developer
      NSUnbufferedIO: YES

    steps:
      - name: Checkout workflow repository
        uses: actions/checkout@v4

      - name: Restore SwiftPM cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.swiftpm
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-mlx-llm-${{ matrix.scheme }}-${{ matrix.configuration }}-${{ matrix.destination_label }}
          restore-keys: |
            ${{ runner.os }}-mlx-llm-${{ matrix.scheme }}-
            ${{ runner.os }}-mlx-llm-

      - name: Prepare workspace
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p ci/repos ci/results/logs

      - name: Clone mlx-swift-examples
        shell: bash
        run: |
          set -euxo pipefail
          git clone --depth 1 --branch main https://github.com/ml-explore/mlx-swift-examples.git ci/repos/mlx-swift-examples

      - name: Iterative ultra verbose build and debug
        shell: bash
        run: |
          set -euxo pipefail

          python3 <<'PY'
          import json
          import subprocess
          import time
          from pathlib import Path

          scheme = "${{ matrix.scheme }}"
          configuration = "${{ matrix.configuration }}"
          destination = "${{ matrix.destination }}"
          destination_label = "${{ matrix.destination_label }}"
          platform = "${{ matrix.platform }}"

          repo = Path("ci/repos/mlx-swift-examples")
          results_dir = Path("ci/results")
          logs_dir = results_dir / "logs"
          logs_dir.mkdir(parents=True, exist_ok=True)

          safe_scheme = scheme.replace("/", "_").replace(":", "_").replace(" ", "_")
          safe_dest = destination_label.replace("/", "_").replace(":", "_").replace(",", "_").replace(" ", "_")
          case_id = f"{safe_scheme}-{configuration}-{safe_dest}"

          def line(ch="=", n=120):
              return ch * n

          def banner(title):
              print(line("="), flush=True)
              print(title, flush=True)
              print(line("="), flush=True)

          def subbanner(title):
              print(line("-"), flush=True)
              print(title, flush=True)
              print(line("-"), flush=True)

          def log(prefix, message):
              print(f"[{prefix}] {message}", flush=True)

          def top_lines(text, limit=25):
              hits = []
              for raw in text.splitlines():
                  s = raw.rstrip()
                  low = s.lower()
                  if any(token in low for token in [
                      "error:",
                      "fatal",
                      "failed",
                      "test failed",
                      "no such module",
                      "unable to",
                      "unsupported",
                      "warning:",
                      "xcodebuild:",
                      "result bundle",
                      "provision",
                      "codesign",
                      "metal",
                      "swift package",
                      "compile",
                      "link",
                  ]):
                      hits.append(s)
              return hits[:limit]

          def run_stream(step_name, cmd, cwd, log_name):
              log_path = logs_dir / log_name
              subbanner(f"[STEP] {step_name}")
              log("INFO", f"WORKDIR={cwd}")
              log("INFO", "COMMAND=" + " ".join(cmd))
              log("INFO", f"LOG={log_path}")
              log("INFO", f"START_TIME={time.strftime('%Y-%m-%d %H:%M:%S')}")

              started = time.time()
              proc = subprocess.Popen(
                  cmd,
                  cwd=cwd,
                  stdout=subprocess.PIPE,
                  stderr=subprocess.STDOUT,
                  text=True,
                  bufsize=1,
              )

              lines = []
              with open(log_path, "w", encoding="utf-8") as f:
                  assert proc.stdout is not None
                  for line_out in proc.stdout:
                      print(line_out, end="", flush=True)
                      f.write(line_out)
                      lines.append(line_out)

              rc = proc.wait()
              seconds = round(time.time() - started, 2)
              output = "".join(lines)
              keys = top_lines(output)

              if rc == 0:
                  log("PASS", f"{step_name} :: {seconds:.2f}s")
              else:
                  log("FAIL", f"{step_name} :: {seconds:.2f}s")
                  if keys:
                      log("FAIL", "top diagnostic lines begin")
                      for k in keys:
                          log("FAIL", k)
                      log("FAIL", "top diagnostic lines end")

              return {
                  "step": step_name,
                  "rc": rc,
                  "seconds": seconds,
                  "log_path": str(log_path),
                  "top_lines": keys,
              }

          def write_snapshot(name, shell_script):
              snapshot_path = logs_dir / f"{case_id}-{name}.log"
              cmd = ["bash", "-lc", shell_script]
              result = subprocess.run(cmd, cwd=repo, text=True, capture_output=True)
              content = []
              content.append(f"COMMAND: {' '.join(cmd)}")
              content.append(f"RETURN_CODE: {result.returncode}")
              content.append("")
              content.append("STDOUT:")
              content.append(result.stdout)
              content.append("")
              content.append("STDERR:")
              content.append(result.stderr)
              snapshot_path.write_text("\n".join(content), encoding="utf-8")
              print(f"[SNAPSHOT] {name} -> {snapshot_path}", flush=True)
              if result.stdout:
                  print(result.stdout, flush=True)
              if result.stderr:
                  print(result.stderr, flush=True)
              return str(snapshot_path)

          banner(f"START CASE :: {scheme} :: {configuration} :: {destination_label}")
          log("CASE", "PROJECT=mlx-swift-examples.xcodeproj")
          log("CASE", f"SCHEME={scheme}")
          log("CASE", f"CONFIGURATION={configuration}")
          log("CASE", f"DESTINATION={destination}")
          log("CASE", f"PLATFORM={platform}")
          log("CASE", f"WORKDIR={repo}")
          log("CASE", f"PWD_EXISTS={repo.exists()}")

          results = []
          snapshots = []

          snapshots.append(write_snapshot(
              "00-environment",
              r'''
              set -euxo pipefail
              date
              uname -a
              sw_vers
              pwd
              env | sort
              '''
          ))

          snapshots.append(write_snapshot(
              "01-repo-layout",
              r'''
              set -euxo pipefail
              pwd
              git rev-parse HEAD
              git status --short --branch
              ls -la
              find . -maxdepth 3 | sort
              test -e mlx-swift-examples.xcodeproj
              echo "[OK] project exists"
              '''
          ))

          repo_check = run_stream(
              "repo_layout_check",
              ["bash", "-lc", "pwd && ls -la && test -e mlx-swift-examples.xcodeproj && echo '[OK] project exists'"],
              repo,
              f"{case_id}-02-repo-layout-check.log",
          )
          results.append(repo_check)

          if repo_check["rc"] != 0:
              summary = {
                  "scheme": scheme,
                  "configuration": configuration,
                  "destination": destination,
                  "destination_label": destination_label,
                  "platform": platform,
                  "status": "failed",
                  "failed_step": "repo_layout_check",
                  "steps": results,
                  "snapshots": snapshots,
              }
              (results_dir / f"{case_id}-summary.json").write_text(json.dumps(summary, indent=2), encoding="utf-8")
              raise SystemExit(1)

          snapshots.append(write_snapshot(
              "03-xcode-list-json",
              r'''
              set -euxo pipefail
              xcodebuild -list -json -project mlx-swift-examples.xcodeproj
              '''
          ))

          snapshots.append(write_snapshot(
              "04-showdestinations",
              f'''
              set -euxo pipefail
              xcodebuild -project mlx-swift-examples.xcodeproj -scheme "{scheme}" -showdestinations
              '''
          ))

          build_settings = run_stream(
              "show_build_settings",
              [
                  "xcodebuild",
                  "-project", "mlx-swift-examples.xcodeproj",
                  "-scheme", scheme,
                  "-configuration", configuration,
                  "-destination", destination,
                  "-showBuildSettings",
              ],
              repo,
              f"{case_id}-05-show-build-settings.log",
          )
          results.append(build_settings)

          snapshots.append(write_snapshot(
              "05b-build-settings-key-grep",
              f'''
              set -euxo pipefail
              xcodebuild -project mlx-swift-examples.xcodeproj -scheme "{scheme}" -configuration "{configuration}" -destination "{destination}" -showBuildSettings | grep -E "PRODUCT_NAME|SDKROOT|SUPPORTED_PLATFORMS|PLATFORM_NAME|TARGET_BUILD_DIR|BUILT_PRODUCTS_DIR|SWIFT_VERSION|ARCHS|CODE_SIGNING_ALLOWED|CODE_SIGNING_REQUIRED" || true
              '''
          ))

          resolve_packages = run_stream(
              "resolve_package_dependencies",
              [
                  "xcodebuild",
                  "-resolvePackageDependencies",
                  "-project", "mlx-swift-examples.xcodeproj",
                  "-scheme", scheme,
                  "-configuration", configuration,
              ],
              repo,
              f"{case_id}-06-resolve-packages.log",
          )
          results.append(resolve_packages)

          snapshots.append(write_snapshot(
              "06b-package-state",
              r'''
              set -euxo pipefail
              find . -maxdepth 3 \( -name Package.resolved -o -name Package.swift \) | sort
              find ~/Library/Developer/Xcode/DerivedData -maxdepth 2 -type d | head -n 50 || true
              '''
          ))

          clean_step = run_stream(
              "clean",
              [
                  "xcodebuild",
                  "-project", "mlx-swift-examples.xcodeproj",
                  "-scheme", scheme,
                  "-configuration", configuration,
                  "-destination", destination,
                  "-derivedDataPath", "DerivedData",
                  "CODE_SIGNING_ALLOWED=NO",
                  "clean",
              ],
              repo,
              f"{case_id}-07-clean.log",
          )
          results.append(clean_step)

          snapshots.append(write_snapshot(
              "07b-deriveddata-before-build",
              r'''
              set -euxo pipefail
              find DerivedData -maxdepth 4 | sort || true
              '''
          ))

          build_attempt_1 = run_stream(
              "build_attempt_1",
              [
                  "xcodebuild",
                  "-project", "mlx-swift-examples.xcodeproj",
                  "-scheme", scheme,
                  "-configuration", configuration,
                  "-destination", destination,
                  "-derivedDataPath", "DerivedData",
                  "CODE_SIGNING_ALLOWED=NO",
                  "build",
              ],
              repo,
              f"{case_id}-08-build-attempt-1.log",
          )
          results.append(build_attempt_1)

          snapshots.append(write_snapshot(
              "08b-deriveddata-after-build-attempt-1",
              r'''
              set -euxo pipefail
              find DerivedData -maxdepth 5 | sort || true
              find DerivedData -type f \( -name "*.xcresult" -o -name "*.log" -o -name "*.txt" \) | sort || true
              '''
          ))

          final_status = "passed"
          failed_step = None

          if build_attempt_1["rc"] != 0:
              log("CHECKPOINT", "first build attempt failed, collecting additional diagnostics")

              snapshots.append(write_snapshot(
                  "09-failure-diagnostics",
                  f'''
                  set -euxo pipefail
                  xcodebuild -project mlx-swift-examples.xcodeproj -scheme "{scheme}" -configuration "{configuration}" -destination "{destination}" -showBuildSettings | tail -n 200 || true
                  '''
              ))

              snapshots.append(write_snapshot(
                  "10-xcresult-search",
                  r'''
                  set -euxo pipefail
                  find /var/folders -type d -name "*.xcresult" 2>/dev/null | tail -n 20 || true
                  '''
              ))

              clean_retry = run_stream(
                  "clean_before_retry",
                  [
                      "xcodebuild",
                      "-project", "mlx-swift-examples.xcodeproj",
                      "-scheme", scheme,
                      "-configuration", configuration,
                      "-destination", destination,
                      "-derivedDataPath", "DerivedDataRetry",
                      "CODE_SIGNING_ALLOWED=NO",
                      "clean",
                  ],
                  repo,
                  f"{case_id}-11-clean-before-retry.log",
              )
              results.append(clean_retry)

              build_attempt_2 = run_stream(
                  "build_attempt_2",
                  [
                      "xcodebuild",
                      "-project", "mlx-swift-examples.xcodeproj",
                      "-scheme", scheme,
                      "-configuration", configuration,
                      "-destination", destination,
                      "-derivedDataPath", "DerivedDataRetry",
                      "CODE_SIGNING_ALLOWED=NO",
                      "build",
                  ],
                  repo,
                  f"{case_id}-12-build-attempt-2.log",
              )
              results.append(build_attempt_2)

              snapshots.append(write_snapshot(
                  "12b-deriveddata-after-build-attempt-2",
                  r'''
                  set -euxo pipefail
                  find DerivedDataRetry -maxdepth 5 | sort || true
                  find DerivedDataRetry -type f \( -name "*.xcresult" -o -name "*.log" -o -name "*.txt" \) | sort || true
                  '''
              ))

              if build_attempt_2["rc"] != 0:
                  final_status = "failed"
                  failed_step = "build_attempt_2"
              else:
                  final_status = "passed"
          else:
              final_status = "passed"

          summary = {
              "scheme": scheme,
              "configuration": configuration,
              "destination": destination,
              "destination_label": destination_label,
              "platform": platform,
              "status": final_status,
              "failed_step": failed_step,
              "steps": results,
              "snapshots": snapshots,
          }

          summary_path = results_dir / f"{case_id}-summary.json"
          summary_path.write_text(json.dumps(summary, indent=2), encoding="utf-8")

          banner(f"END CASE :: {scheme} :: {configuration} :: {destination_label} :: {final_status.upper()}")
          print(json.dumps(summary, indent=2), flush=True)

          raise SystemExit(1 if final_status != "passed" else 0)
          PY

      - name: Print case result files and summary block to console
        if: always()
        shell: bash
        run: |
          set -euxo pipefail

          python3 <<'PY'
          import json
          from pathlib import Path

          results = Path("ci/results")
          summaries = sorted(results.glob("*-summary.json"))

          print("=" * 120)
          print("FINAL CASE SUMMARY BLOCK")
          print("=" * 120)

          if not summaries:
              print("[SUMMARY] No case summaries were found.")
          else:
              print("| Case | Status | Failed step | Steps | Snapshots |")
              print("|---|---|---|---:|---:|")
              for s in summaries:
                  data = json.loads(s.read_text(encoding="utf-8"))
                  case_name = f"{data['scheme']} | {data['configuration']} | {data['destination_label']}"
                  print(f"| {case_name} | {data['status']} | {data.get('failed_step') or ''} | {len(data.get('steps', []))} | {len(data.get('snapshots', []))} |")

          print("=" * 120)
          PY

          echo "::group::case result tree"
          find ci/results -maxdepth 3 -type f | sort
          echo "::endgroup::"

          echo "::group::all json summaries"
          find ci/results -type f -name '*-summary.json' | sort | while read -r f; do
            echo "===== $f ====="
            cat "$f"
            echo
          done
          echo "::endgroup::"

          echo "::group::tail of all logs"
          find ci/results/logs -type f | sort | while read -r f; do
            echo "===== LOG FILE: $f ====="
            tail -n 120 "$f" || true
            echo
          done
          echo "::endgroup::"

      - name: Upload case artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlx-${{ matrix.scheme }}-${{ matrix.configuration }}-${{ matrix.destination_label }}
          path: ci/results
          if-no-files-found: ignore

  summary:
    name: Summarize all LLM example results
    if: always()
    needs:
      - discover
      - iterative-builds
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Build final summary and print console block
        shell: bash
        run: |
          set -euxo pipefail

          python3 <<'PY'
          import json
          from pathlib import Path

          artifacts = Path("artifacts")
          summary_lines = []

          summary_lines.append("${{ needs.discover.outputs.discovery_summary }}")
          summary_lines.append("")
          summary_lines.append("## LLM example case summaries")
          summary_lines.append("")
          summary_lines.append("| Case | Status | Failed step | Step count | Snapshot count |")
          summary_lines.append("|---|---|---|---:|---:|")

          summary_files = sorted(artifacts.glob("**/*-summary.json"))
          passed = 0
          failed = 0

          for path in summary_files:
              data = json.loads(path.read_text(encoding="utf-8"))
              case_name = f"{data['scheme']} | {data['configuration']} | {data['destination_label']}"
              status = data["status"]
              failed_step = data.get("failed_step") or ""
              step_count = len(data.get("steps", []))
              snapshot_count = len(data.get("snapshots", []))
              if status == "passed":
                  passed += 1
              else:
                  failed += 1
              summary_lines.append(f"| {case_name} | {status} | {failed_step} | {step_count} | {snapshot_count} |")

          summary_lines.append("")
          summary_lines.append(f"- Passed cases: **{passed}**")
          summary_lines.append(f"- Failed cases: **{failed}**")
          summary_lines.append("")
          summary_lines.append("## Artifact tree")
          summary_lines.append("```")
          for p in sorted(artifacts.glob("**/*")):
              if p.is_file():
                  summary_lines.append(str(p))
          summary_lines.append("```")

          summary_text = "\n".join(summary_lines) + "\n"
          print(summary_text)

          step_summary_path = Path("${GITHUB_STEP_SUMMARY}")
          with open(step_summary_path, "a", encoding="utf-8") as f:
              f.write(summary_text)

          print("=" * 120)
          print("GLOBAL FINAL SUMMARY BLOCK")
          print("=" * 120)
          print(f"[SUMMARY] Passed cases: {passed}")
          print(f"[SUMMARY] Failed cases: {failed}")
          for path in summary_files:
              data = json.loads(path.read_text(encoding="utf-8"))
              print(f"[SUMMARY] CASE={data['scheme']} | {data['configuration']} | {data['destination_label']} | STATUS={data['status']} | FAILED_STEP={data.get('failed_step') or '-'}")
          print("=" * 120)
          PY

          echo "::group::artifact tree"
          find artifacts -maxdepth 4 -type f | sort
          echo "::endgroup::"

          echo "::group::summary json files"
          find artifacts -type f -name '*-summary.json' | sort | while read -r f; do
            echo "===== $f ====="
            cat "$f"
            echo
          done
          echo "::endgroup::"
